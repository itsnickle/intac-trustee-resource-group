<!doctype html><html lang="en"><head><meta charset="utf-8">
<title>About – Intac Advisory Group</title>
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="0; url=index.html">
<link rel="canonical" href="index.html">
<style>html,body{margin:0;height:100%;background:#641928;color:#fff;font-family:Raleway,Arial,sans-serif;
display:flex;align-items:center;justify-content:center;text-align:center}
a{color:#fff;font-weight:600}</style>
<script>location.replace("index.html");</script></head>
<body><div><p style="letter-spacing:2px;font-size:13px">INTAC ADVISORY</p>
<p>Redirecting… if nothing happens, <a href="index.html">continue here</a>.</p></div>
<script id="trg-bgfix">
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('*').forEach(function(el){
    var bg=getComputedStyle(el).backgroundImage;
    if(!bg||bg==='none'||bg.indexOf('assets/')<0) return;
    var m=bg.match(/url\(["']?([^"')]+)["']?\)/);
    if(!m) return;
    var probe=new Image();
    probe.onerror=function(){ el.style.backgroundColor='#641928'; el.style.backgroundImage='none'; };
    probe.src=m[1];
  });
});
</script>

<script id="trg-collapse">
document.addEventListener('DOMContentLoaded',function(){
  setTimeout(function(){
    document.querySelectorAll('div[id^="row-unique"], .vc_row.row-container').forEach(function(el){
      var r=el.getBoundingClientRect();
      if(r.height<90) return;
      var txt=(el.innerText||'').replace(/\s+/g,'').length;
      var imgs=Array.prototype.slice.call(el.querySelectorAll('img')).filter(function(i){return i.offsetParent!==null && i.naturalWidth>0;}).length;
      var bgc=getComputedStyle(el).backgroundColor;
      var plain = (bgc==='rgba(0, 0, 0, 0)'||bgc==='rgb(255, 255, 255)'||bgc==='transparent');
      if(txt<3 && imgs===0 && plain){ el.style.display='none'; }
    });
  }, 500);
});
</script>
</body></html>
